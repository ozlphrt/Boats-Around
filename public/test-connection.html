<!DOCTYPE html>
<html>

<head>
    <title>AISStream Connection Test</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .status {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .log {
            width: 80%;
            height: 300px;
            background: #000;
            overflow-y: scroll;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #444;
        }

        .success {
            color: #4caf50;
        }

        .error {
            color: #f44336;
        }

        .connecting {
            color: #ffeb3b;
        }
    </style>
</head>

<body>
    <h1>AISStream Browser Test</h1>
    <div id="status" class="status connecting">Connecting...</div>
    <div id="log" class="log"></div>

    <script>
        const API_KEY = "a73d7123681f15fa8d4ff6ff4123bb391fd3845a";
        const logDiv = document.getElementById('log');
        const statusDiv = document.getElementById('status');

        function log(msg, type = 'info') {
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            line.style.color = type === 'error' ? '#f44336' : (type === 'success' ? '#4caf50' : '#ddd');
            logDiv.appendChild(line);
            console.log(msg);
        }

        try {
            log("Initializing WebSocket...");
            // Use local proxy to bypass browser blocking/CORS
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const proxyUrl = `${protocol}//${window.location.host}/api/socket`;

            log(`Connecting to ${proxyUrl}...`);
            const socket = new WebSocket(proxyUrl);

            socket.onopen = function (e) {
                log("Socket Open!", "success");
                statusDiv.textContent = "Authenticating...";
                statusDiv.className = "status connecting";

                const sub = {
                    APIKey: API_KEY,
                    BoundingBoxes: [[[-90, -180], [90, 180]]],
                    FilterMessageTypes: ["PositionReport"]
                };
                log("Sending subscription...");
                socket.send(JSON.stringify(sub));
            };

            socket.onmessage = function (event) {
                const msg = JSON.parse(event.data);
                log(`Received Message: ${msg.MessageType}`, "success");

                statusDiv.textContent = "Connected & Receiving Data!";
                statusDiv.className = "status success";

                socket.close(); // Success, close it.
                log("Test Passed. Closing socket.");
            };

            socket.onclose = function (event) {
                if (statusDiv.textContent.includes("Connected")) return;

                let reason = "Unknown";
                if (event.code === 1006) reason = "Connection Dropped (Blocked?)";
                if (event.code === 4001) reason = "Invalid API Key";
                if (event.code === 4003) reason = "Rate Limited";

                log(`Socket Closed: ${event.code} - ${reason}`, "error");
                statusDiv.textContent = `Failed: ${reason}`;
                statusDiv.className = "status error";
            };

            socket.onerror = function (error) {
                log(`Socket Error: ${error}`, "error");
            };

        } catch (e) {
            log(`Exception: ${e.message}`, "error");
        }
    </script>
</body>

</html>
